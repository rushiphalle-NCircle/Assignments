name: Revit .NET Build
 
on:
  push:
    branches: [ "master", "develop", "feature_*" ]
  pull_request:
    branches: [ "main", "develop" ]
 
jobs:
  dotnet-framework-48:
    name: Build .NET Framework 4.8 (Windows 2022)
    runs-on: windows-2022
 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
 
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1

      - name: Restore Packages
        run: msbuild Assignments.csproj /t:Restore

      # ✅ Setup MSBuild
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1
 
      # ✅ Build
      - name: Build Project
        run: msbuild Assignments.csproj /p:Configuration=Debug /p:Platform="Any CPU"
 
